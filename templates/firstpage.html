<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PARK MANIA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    h1 {
      color: white;
      font-size: 3rem;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .bg-image {
      background-image: url(https://tinyurl.com/3u6vyrjc);
      height: 100vh;
      background-repeat:no-repeat;
      background-size:cover;
      background-position:center;
      position:relative; 
    }

    .mask {
      background-color: rgba(0, 0, 0, 0.6);
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:1; 
    }
  </style>
</head>
<body>

  <div class="bg-image d-flex flex-column justify-content-center align-items-center">
  <div class="mask"></div>
  <h1>Welcome to PARK MANIA</h1>
  <div class="mt-4 position-relative z-2">
    <a href="/login" class="btn btn-primary me-3">login</a>
    <a href="/register" class="btn btn-secondary">register</a>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
